# Model Configuration

# Primary and Fallback Models
models:
  # Coding models
  coding:
    primary:
      name: "kimi-k2.5"
      provider: "moonshot"
      max_tokens: 8000
      cost_per_1k_input: 0.002
      cost_per_1k_output: 0.006
      
    fallback_chain:
      - name: "deepseek-coder"
        provider: "deepseek"
        max_tokens: 8000
        cost_per_1k_input: 0.001
        cost_per_1k_output: 0.002
        
      - name: "gpt-4o-mini"
        provider: "openai"
        max_tokens: 4000
        cost_per_1k_input: 0.00015
        cost_per_1k_output: 0.0006
        
