      max_tokens: 2000
      cost_per_1k_input: 0.001
      cost_per_1k_output: 0.002
      
    fallback:
      name: "gpt-4o"
      provider: "openai"
      max_tokens: 2000
      cost_per_1k_input: 0.005
      cost_per_1k_output: 0.015
      
  # Planner models
  planner:
    primary:
      name: "deepseek-reasoner"
      provider: "deepseek"
      max_tokens: 4000
      cost_per_1k_input: 0.002
      cost_per_1k_output: 0.004
      
