# Cost Optimization Rules
cost_optimization:
  # Use cheaper models for simple tasks
  simple_tasks:
    max_tokens_threshold: 500
    use_model: "gpt-4o-mini"
    
  # Use expensive models only when necessary
  high_value_tasks:
    patterns:
      - "production.*code"
      - "security.*review"
      - "architecture.*design"
      - "critical.*bug"
    use_model: "gpt-5.1-codex"
    
  # Budget limits per request type
  budget_limits:
    triage:
      max_cost_usd: 0.01
    automation:
      max_cost_usd: 0.05
    research:
      max_cost_usd: 0.10
    coding:
      max_cost_usd: 0.20
    planning:
      max_cost_usd: 0.15
    review:
      max_cost_usd: 0.30
