# Watchdog Thresholds

# Timeout Configuration
timeouts:
  # Task timeout in seconds
  default_task_timeout: 30
  
  # Agent-specific timeouts
  agent_timeouts:
    triage: 10
    orchestrator: 15
    planner: 20
    research: 30
    coding: 30
    automation: 20
    critique: 15
    reviewer: 30
    
  # Parallel execution timeout
  parallel_execution_timeout: 60
  
  # Synchronization timeout
  sync_timeout: 45

# Token Usage Limits
token_limits:
  # Maximum tokens per request
  max_tokens_per_request: 10000
  
  # Warning thresholds
  warning_thresholds:
    yellow: 5000   # 50% of max
    orange: 7500   # 75% of max
    red: 9000      # 90% of max
    
  # Rate limiting
  rate_limits:
    requests_per_minute: 30
    tokens_per_minute: 50000

# Retry Configuration
retries:
  # Maximum retry attempts
  max_retries: 3
  
  # Retry delays (exponential backoff)
  retry_delays:
    - 1    # 1 second
    - 2    # 2 seconds
    - 4    # 4 seconds
    
  # Retryable errors
  retryable_errors:
    - timeout
    - rate_limit
    - service_unavailable
    - network_error
    
  # Non-retryable errors
  non_retryable_errors:
    - invalid_request
    - authentication_error
    - content_policy_violation

# Stalled Task Detection
stalled_task_detection:
  enabled: true
  
  # Check interval in seconds
  check_interval: 5
  
  # Stalled thresholds
  stalled_thresholds:
    no_progress_seconds: 15
    no_output_seconds: 20
    
  # Actions on stalled task
  actions:
    - log_warning
    - send_heartbeat
    - trigger_fallback

# Runaway Loop Prevention
loop_prevention:
  enabled: true
  
  # Maximum iterations
  max_iterations:
    default: 10
    planning: 5
    critique: 3
    
  # Maximum recursive depth
  max_recursion_depth: 5
  
  # Detect repeated patterns
  pattern_detection:
    enabled: true
    similarity_threshold: 0.9
    window_size: 5

# Resource Limits
resource_limits:
  # Memory limits
  max_memory_mb: 512
  
  # CPU limits
  max_cpu_percent: 80
  
  # Disk limits
  max_disk_mb: 100
  
  # Concurrent task limits
  max_concurrent_tasks: 5

# Circuit Breaker Configuration
circuit_breaker:
  enabled: true
  
  # Failure threshold
  failure_threshold: 5
  
  # Recovery timeout
  recovery_timeout: 30
  
  # Half-open requests
  half_open_max_calls: 3

# Alert Thresholds
alert_thresholds:
  # Latency alerts
  latency:
    warning: 5000   # 5 seconds
    critical: 10000 # 10 seconds
    
  # Error rate alerts
  error_rate:
    warning: 0.05   # 5%
    critical: 0.10  # 10%
    
  # Token usage alerts
  token_usage:
    warning: 0.70   # 70%
    critical: 0.90  # 90%
    
  # Cost alerts
  cost:
    warning: 0.50   # $0.50
    critical: 1.00  # $1.00
