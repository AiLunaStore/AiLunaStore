<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Nurse Brain Sheet v2 - Minimalist</title>
    <style>
        @page {
            size: landscape;
            margin: 0.25in;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 9pt;
            line-height: 1.2;
            color: #000;
            background: #fff;
            padding: 0.25in;
        }
        .page {
            width: 10.5in;
            height: 8in;
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            margin-bottom: 0.1in;
            border-bottom: 2px solid #000;
            padding-bottom: 0.05in;
        }
        .header h1 {
            font-size: 14pt;
            font-weight: bold;
        }
        .header-info {
            display: flex;
            justify-content: space-around;
            font-size: 10pt;
            margin-top: 0.05in;
        }
        .header-info span {
            display: inline-block;
        }
        .header-info input {
            border: none;
            border-bottom: 1px solid #000;
            width: 1.2in;
            text-align: center;
            font-size: 10pt;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 0.15in;
            margin-top: 0.15in;
            flex: 1;
        }
        .patient {
            border: 1px solid #000;
            padding: 0.1in;
            page-break-inside: avoid;
        }
        .patient-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.05in;
            font-weight: bold;
            font-size: 10pt;
        }
        .patient-header .esi {
            display: flex;
            gap: 0.05in;
        }
        .patient-header .esi span {
            display: inline-block;
            width: 0.2in;
            height: 0.2in;
            border: 1px solid #000;
            text-align: center;
            line-height: 0.2in;
            font-size: 7pt;
        }
        .field {
            margin-bottom: 0.04in;
        }
        .field label {
            font-weight: bold;
            display: inline-block;
            width: 1.2in;
        }
        .field input[type="text"] {
            border: none;
            border-bottom: 1px solid #ccc;
            width: calc(100% - 1.2in);
            font-size: 9pt;
            padding: 0.01in 0.02in;
        }
        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.05in;
            margin-top: 0.03in;
        }
        .vitals-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .vitals-item label {
            font-size: 7pt;
            font-weight: bold;
        }
        .vitals-item input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            text-align: center;
            font-size: 9pt;
        }
        .notes-field {
            margin-top: 0.05in;
        }
        .notes-field label {
            display: block;
            font-weight: bold;
        }
        .notes-field textarea {
            width: 100%;
            height: 0.4in;
            border: 1px solid #ccc;
            font-size: 9pt;
            padding: 0.02in;
            resize: none;
        }
        @media print {
            body {
                padding: 0;
            }
            .patient {
                border: 1px solid #000;
            }
            input, textarea {
                border: 1px solid #ccc !important;
            }
        }
    </style>
