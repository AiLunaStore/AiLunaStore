<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Front view -->
  <g transform="translate(50, 0)">
    <!-- Head -->
    <circle cx="50" cy="30" r="15" fill="none" stroke="black" stroke-width="1.5"/>
    
    <!-- Body -->
    <path d="M50 45 L50 120" stroke="black" stroke-width="1.5" fill="none"/>
    
    <!-- Arms -->
    <path d="M50 60 L20 80" stroke="black" stroke-width="1.5" fill="none"/>
    <path d="M50 60 L80 80" stroke="black" stroke-width="1.5" fill="none"/>
    
    <!-- Legs -->
    <path d="M50 120 L30 170" stroke="black" stroke-width="1.5" fill="none"/>
    <path d="M50 120 L70 170" stroke="black" stroke-width="1.5" fill="none"/>
    
    <text x="50" y="190" text-anchor="middle" font-size="12">Front</text>
  </g>
  
  <!-- Back view -->
  <g transform="translate(250, 0)">
    <!-- Head -->
    <circle cx="50" cy="30" r="15" fill="none" stroke="black" stroke-width="1.5"/>
    
    <!-- Body -->
    <path d="M50 45 L50 120" stroke="black" stroke-width="1.5" fill="none"/>
    
    <!-- Arms (slightly different angle for back) -->
    <path d="M50 60 L25 85" stroke="black" stroke-width="1.5" fill="none"/>
    <path d="M50 60 L75 85" stroke="black" stroke-width="1.5" fill="none"/>
    
    <!-- Legs -->
    <path d="M50 120 L35 170" stroke="black" stroke-width="1.5" fill="none"/>
    <path d="M50 120 L65 170" stroke="black" stroke-width="1.5" fill="none"/>
    
    <text x="50" y="190" text-anchor="middle" font-size="12">Back</text>
  </g>
</svg>