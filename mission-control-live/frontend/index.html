<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control - Live Agent Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        /* Floating bubbles container */
        #agent-space {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0f 100%);
            overflow: hidden;
        }
        
        /* Agent bubble */
        .agent-bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 2px solid transparent;
            animation: float 20s infinite ease-in-out;
        }
        
        .agent-bubble:hover {
            transform: scale(1.1);
            z-index: 100;
            box-shadow: 0 0 50px currentColor;
        }
        
        /* Agent status colors */
        .status-active {
            background: radial-gradient(circle at 30% 30%, rgba(72, 187, 120, 0.9), rgba(72, 187, 120, 0.3));
            border-color: #48bb78;
            color: #48bb78;
        }
        
        .status-thinking {
            background: radial-gradient(circle at 30% 30%, rgba(246, 173, 85, 0.9), rgba(246, 173, 85, 0.3));
            border-color: #f6ad55;
            color: #f6ad55;
            animation: pulse 2s infinite;
        }
        
        .status-idle {
            background: radial-gradient(circle at 30% 30%, rgba(113, 128, 150, 0.9), rgba(113, 128, 150, 0.3));
            border-color: #718096;
            color: #718096;
        }
        
        .status-error {
            background: radial-gradient(circle at 30% 30%, rgba(245, 101, 101, 0.9), rgba(245, 101, 101, 0.3));
            border-color: #f56565;
            color: #f56565;
            animation: shake 0.5s infinite;
        }
        
        /* Agent content */
        .agent-name {
            font-weight: 600;
            font-size: 0.9em;
            text-align: center;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .agent-model {
            font-size: 0.7em;
            opacity: 0.8;
            text-align: center;
        }
        
        .agent-metrics {
            font-size: 0.6em;
            opacity: 0.7;
            margin-top: 4px;
            text-align: center;
        }
        
        /* Connection lines */
        .connection {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, currentColor, transparent);
            transform-origin: 0 0;
            pointer-events: none;
            opacity: 0.3;
        }
        
        /* Control panel */
        #control-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .control-button {
            background: #2d3748;
            border: none;
            color: #e2e8f0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        
        .control-button:hover {
            background: #4a5568;
            transform: translateY(-2px);
        }
        
        .control-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Stats overlay */
        #stats-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 15px;
            width: 280px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .stats-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #63b3ed;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.9em;
        }
        
        .stat-label {
            opacity: 0.8;
        }
        
        .stat-value {
            font-weight: 500;
        }
        
        /* Connection status */
        #connection-status {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 10px 15px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-connected {
            background: #48bb78;
        }
        
        .status-disconnected {
            background: #f56565;
        }
        
        .status-connecting {
            background: #f6ad55;
        }
        
        .status-text {
            font-size: 0.9em;
            font-weight: 500;
        }
        
        .data-source {
            font-size: 0.75em;
            opacity: 0.7;
            margin-left: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }
        
        .data-source.simulated {
            background: rgba(246, 173, 85, 0.3);
            color: #f6ad55;
        }
        
        .data-source.live {
            background: rgba(72, 187, 120, 0.3);
            color: #48bb78;
        }
        
        /* Animations */
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -10px) rotate(1deg); }
            50% { transform: translate(-5px, 5px) rotate(-1deg); }
            75% { transform: translate(-10px, -5px) rotate(1deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }
        
        /* Agent detail modal */
        .agent-detail {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid #4a5568;
            border-radius: 16px;
            padding: 25px;
            width: 400px;
            z-index: 2000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            display: none;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .detail-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .detail-title {
            font-size: 1.3em;
            font-weight: 600;
        }
        
        .detail-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 1.5em;
            cursor: pointer;
        }
        
        .detail-content {
            font-size: 0.9em;
            line-height: 1.5;
        }
        
        .detail-section {
            margin-bottom: 15px;
        }
        
        .detail-label {
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        /* Error message */
        .error-message {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(245, 101, 101, 0.9);
            border: 1px solid #f56565;
            border-radius: 8px;
            padding: 12px 16px;
            z-index: 1000;
            display: none;
            max-width: 300px;
        }
        
        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Connection status -->
    <div id="connection-status">
        <div class="status-indicator status-connecting" id="status-indicator"></div>
        <span class="status-text" id="status-text">Connecting...</span>
        <span class="data-source" id="data-source">Initializing</span>
    </div>
    
    <!-- Error message -->
    <div class="error-message" id="error-message">
        <strong>Connection Error</strong><br>
        <span id="error-text">Unable to connect to API server</span>
    </div>
    
    <!-- Floating agent space -->
    <div id="agent-space">
        <!-- Connection lines will be drawn here -->
        <!-- Agent bubbles will be added here -->
    </div>
    
    <!-- Stats overlay -->
    <div id="stats-overlay">
        <div class="stats-title">📊 System Stats</div>
        <div class="stat-item">
            <span class="stat-label">Active Agents:</span>
            <span class="stat-value" id="active-count">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Total Tokens:</span>
            <span class="stat-value" id="total-tokens">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Success Rate:</span>
            <span class="stat-value" id="success-rate">100%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Avg Duration:</span>
            <span class="stat-value" id="avg-duration">0s</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Uptime:</span>
            <span class="stat-value" id="uptime">100%</span>
        </div>
    </div>
    
    <!-- Control panel -->
    <div id="control-panel">
        <button class="control-button" onclick="refreshData()">🔄 Refresh</button>
        <button class="control-button" onclick="toggleConnections()">🔗 Toggle Connections</button>
        <button class="control-button" onclick="exportStats()">📥 Export</button>
        <button class="control-button" onclick="reconnect()">🔌 Reconnect</button>
    </div>
    
    <!-- Agent detail modal -->
    <div id="agent-detail" class="agent-detail">
        <div class="detail-header">
            <div class="detail-status" id="detail-status"></div>
            <div class="detail-title" id="detail-name"></div>
            <button class="detail-close" onclick="closeDetail()">×</button>
        </div>
        <div class="detail-content">
            <div class="detail-section">
                <div class="detail-label">Model:</div>
                <div id="detail-model"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">Status:</div>
                <div id="detail-status-text"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">Duration:</div>
                <div id="detail-duration"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">Tokens:</div>
                <div id="detail-tokens"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">Task:</div>
                <div id="detail-task"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">Last Activity:</div>
                <div id="detail-last-activity"></div>
            </div>
            <div class="detail-section">
                <div class="detail-label">Type:</div>
                <div id="detail-type"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Configuration
        const API_BASE = 'http://localhost:8080';
        const WS_URL = 'ws://localhost:8080/ws';
        
        // State
        let agents = [];
        let metrics = {};
        let ws = null;
        let reconnectInterval = null;
        let connectionsVisible = true;
        let isSimulated = false;
        
        const agentSpace = document.getElementById('agent-space');
        
        // Initialize
        function init() {
            connectWebSocket();
            fetchInitialData();
        }
        
        // Connect to WebSocket
        function connectWebSocket() {
            updateConnectionStatus('connecting', 'Connecting...');
            
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = () => {
                    console.log('WebSocket connected');
                    updateConnectionStatus('connected', 'Live');
                    hideError();
                    
                    // Clear any reconnect interval
                    if (reconnectInterval) {
                        clearInterval(reconnectInterval);
                        reconnectInterval = null;
                    }
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleWebSocketMessage(data);
                    } catch (error) {
                        console.error('Error parsing WebSocket message:', error);
                    }
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateConnectionStatus('disconnected', 'Disconnected');
                    showError('WebSocket connection error');
                };
                
                ws.onclose = () => {
                    console.log('WebSocket closed');
                    updateConnectionStatus('disconnected', 'Disconnected');
                    
                    // Attempt to reconnect every 5 seconds
                    if (!reconnectInterval) {
                        reconnectInterval = setInterval(() => {
                            console.log('Attempting to reconnect...');
                            connectWebSocket();
                        }, 5000);
                    }
                };
            } catch (error) {
                console.error('Error creating WebSocket:', error);
                updateConnectionStatus('disconnected', 'Error');
                showError('Failed to create WebSocket connection');
            }
        }
        
        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            if (data.type === 'init' || data.type === 'update') {
                agents = data.agents || [];
                metrics = data.metrics || {};
                isSimulated = data.source === 'simulated';
                
                updateDataSource(data.source);
                renderAgents();
                updateStats();
                drawConnections();
            }
        }
        
        // Fetch initial data via REST API (fallback)
        async function fetchInitialData() {
            try {
                const response = await fetch(`${API_BASE}/api/agents`);
                if (!response.ok) throw new Error('API request failed');
                
                const data = await response.json();
                agents = data.agents || [];
                metrics = data.metrics || {};
                isSimulated = data.source === 'simulated';
                
                updateDataSource(data.source);
                renderAgents();
                updateStats();
                drawConnections();
            } catch (error) {
                console.error('Error fetching initial data:', error);
                // Will use simulation fallback from WebSocket
            }
        }
        
        // Update connection status UI
        function updateConnectionStatus(status, text) {
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            
            indicator.className = `status-indicator status-${status}`;
            statusText.textContent = text;
        }
        
        // Update data source indicator
        function updateDataSource(source) {
            const sourceEl = document.getElementById('data-source');
            sourceEl.textContent = source === 'live' ? 'LIVE' : 'SIMULATED';
            sourceEl.className = `data-source ${source}`;
        }
        
        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorEl.classList.add('show');
            
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 5000);
        }
        
        // Hide error message
        function hideError() {
            const errorEl = document.getElementById('error-message');
            errorEl.classList.remove('show');
        }
        
        // Render agent bubbles
        function renderAgents() {
            // Clear existing agents
            document.querySelectorAll('.agent-bubble').forEach(el => el.remove());
            
            agents.forEach(agent => {
                createAgentBubble(agent);
            });
        }
        
        // Create agent bubble
        function createAgentBubble(agent) {
            const existing = document.getElementById(`agent-${agent.id}`);
            if (existing) existing.remove();
            
            const bubble = document.createElement('div');
            bubble.className = `agent-bubble status-${agent.status}`;
            bubble.id = `agent-${agent.id}`;
            
            // Size based on agent type
            const size = agent.size || 80;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            
            // Position - use stored position or random
            if (agent.x && agent.y) {
                bubble.style.left = `${agent.x}px`;
                bubble.style.top = `${agent.y}px`;
            } else {
                const x = Math.random() * (window.innerWidth - size - 100) + 50;
                const y = Math.random() * (window.innerHeight - size - 150) + 50;
                bubble.style.left = `${x}px`;
                bubble.style.top = `${y}px`;
                agent.x = x;
                agent.y = y;
            }
            
            // Random animation delay
            bubble.style.animationDelay = `${Math.random() * 5}s`;
            
            // Content
            bubble.innerHTML = `
                <div class="agent-name">${agent.name}</div>
                <div class="agent-model">${agent.model}</div>
                <div class="agent-metrics">${(agent.tokens || 0).toLocaleString()} tokens</div>
            `;
            
            // Click handler
            bubble.onclick = () => showAgentDetail(agent);
            
            agentSpace.appendChild(bubble);
        }
        
        // Draw connections between agents
        function drawConnections() {
            // Clear existing connections
            document.querySelectorAll('.connection').forEach(el => el.remove());
            
            if (!connectionsVisible || agents.length < 2) return;
            
            // Draw connections between adjacent agents
            for (let i = 0; i < agents.length - 1; i++) {
                const from = document.getElementById(`agent-${agents[i].id}`);
                const to = document.getElementById(`agent-${agents[i + 1].id}`);
                
                if (from && to) {
                    drawConnectionLine(from, to);
                }
            }
        }
        
        // Draw a single connection line
        function drawConnectionLine(from, to) {
            const fromRect = from.getBoundingClientRect();
            const toRect = to.getBoundingClientRect();
            
            const x1 = fromRect.left + fromRect.width / 2;
            const y1 = fromRect.top + fromRect.height / 2;
            const x2 = toRect.left + toRect.width / 2;
            const y2 = toRect.top + toRect.height / 2;
            
            const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            
            const connection = document.createElement('div');
            connection.className = 'connection';
            connection.style.width = `${length}px`;
            connection.style.left = `${x1}px`;
            connection.style.top = `${y1}px`;
            connection.style.transform = `rotate(${angle}deg)`;
            connection.style.color = getComputedStyle(from).color;
            
            agentSpace.appendChild(connection);
        }
        
        // Update statistics
        function updateStats() {
            const activeAgents = agents.filter(a => a.status === 'active' || a.status === 'thinking').length;
            const totalTokens = agents.reduce((sum, a) => sum + (a.tokens || 0), 0);
            
            document.getElementById('active-count').textContent = `${activeAgents}/${agents.length}`;
            document.getElementById('total-tokens').textContent = totalTokens.toLocaleString();
            document.getElementById('success-rate').textContent = `${(metrics.successRate || 100).toFixed(1)}%`;
            document.getElementById('avg-duration').textContent = calculateAvgDuration();
            document.getElementById('uptime').textContent = '100%';
        }
        
        // Calculate average duration
        function calculateAvgDuration() {
            const durations = agents
                .filter(a => a.duration && a.duration !== '0s')
                .map(a => {
                    const match = a.duration.match(/(\d+)([sm])/);
                    if (match) {
                        const val = parseInt(match[1]);
                        return match[2] === 'm' ? val * 60 : val;
                    }
                    return 0;
                });
            
            if (durations.length === 0) return '0s';
            
            const avg = Math.round(durations.reduce((a, b) => a + b, 0) / durations.length);
            return avg > 60 ? `${Math.round(avg / 60)}m` : `${avg}s`;
        }
        
        // Show agent detail
        function showAgentDetail(agent) {
            document.getElementById('detail-name').textContent = agent.name;
            document.getElementById('detail-model').textContent = agent.model;
            document.getElementById('detail-status-text').textContent = agent.status.charAt(0).toUpperCase() + agent.status.slice(1);
            document.getElementById('detail-duration').textContent = agent.duration || '0s';
            document.getElementById('detail-tokens').textContent = (agent.tokens || 0).toLocaleString() + ' tokens';
            document.getElementById('detail-task').textContent = agent.task || 'No task';
            document.getElementById('detail-last-activity').textContent = new Date(agent.lastActivity).toLocaleTimeString();
            document.getElementById('detail-type').textContent = agent.type || 'Unknown';
            
            // Set status color
            const statusEl = document.getElementById('detail-status');
            statusEl.className = 'detail-status';
            statusEl.style.background = getStatusColor(agent.status);
            
            document.getElementById('agent-detail').style.display = 'block';
        }
        
        // Get status color
        function getStatusColor(status) {
            const colors = {
                active: '#48bb78',
                thinking: '#f6ad55',
                idle: '#718096',
                error: '#f56565'
            };
            return colors[status] || '#718096';
        }
        
        // Close detail
        function closeDetail() {
            document.getElementById('agent-detail').style.display = 'none';
        }
        
        // Control functions
        function refreshData() {
            fetchInitialData();
        }
        
        function toggleConnections() {
            connectionsVisible = !connectionsVisible;
            drawConnections();
        }
        
        function reconnect() {
            if (ws) {
                ws.close();
            }
            connectWebSocket();
        }
        
        function exportStats() {
            const stats = {
                timestamp: new Date().toISOString(),
                agents: agents.length,
                activeAgents: agents.filter(a => a.status === 'active' || a.status === 'thinking').length,
                totalTokens: agents.reduce((sum, a) => sum + (a.tokens || 0), 0),
                metrics,
                agentDetails: agents.map(a => ({
                    id: a.id,
                    name: a.name,
                    status: a.status,
                    model: a.model,
                    tokens: a.tokens,
                    duration: a.duration,
                    task: a.task,
                    type: a.type
                }))
            };
            
            const dataStr = JSON.stringify(stats, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `mission-control-stats-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            drawConnections();
        });
        
        // Close detail when clicking outside
        window.addEventListener('click', (e) => {
            const detail = document.getElementById('agent-detail');
            if (detail.style.display === 'block' && !detail.contains(e.target) && !e.target.closest('.agent-bubble')) {
                closeDetail();
            }
        });
        
        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
