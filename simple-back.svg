<svg viewBox="0 0 80 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;max-height:100%;" aria-label="Simple body outline - back view for surgical site marking">
  <!-- Simple gender-neutral body outline — back view, arms slightly away from body -->
  <!-- Head -->
  <ellipse cx="40" cy="22" rx="16" ry="19" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Neck -->
  <path d="M35 41 L35 49 L45 49 L45 41" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Torso outline -->
  <path d="M18 49 L14 90 L14 138 L23 142 L40 142 L57 142 L66 138 L66 90 L70 49 L57 49 L57 66 L50 66 L50 49 L30 49 L30 66 L23 66 L23 49 Z" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Left Arm (slightly away from side) -->
  <path d="M18 51 L7 70 L2 98 L5 103 L11 100 L16 76 L23 58" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right Arm (slightly away from side) -->
  <path d="M70 51 L81 70 L86 98 L83 103 L77 100 L72 76 L65 58" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Left Leg -->
  <path d="M23 142 L21 190 L19 245 L17 280 L21 285 L28 280 L32 240 L35 190 L40 142" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right Leg -->
  <path d="M57 142 L59 190 L61 240 L64 280 L68 285 L71 280 L69 245 L67 190 L64 142" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- L / R markers -->
  <text x="5" y="95" text-anchor="middle" font-size="9" font-family="Arial, sans-serif" fill="#2c3e50" font-weight="700">L</text>
  <text x="75" y="95" text-anchor="middle" font-size="9" font-family="Arial, sans-serif" fill="#2c3e50" font-weight="700">R</text>
  <!-- BACK label -->
  <text x="40" y="305" text-anchor="middle" font-size="9" font-family="Arial, sans-serif" fill="#2c3e50" font-weight="600">BACK</text>
</svg>
