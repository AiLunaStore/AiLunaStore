<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ER Nurse Brain Sheet v4</title>
    <style>
        :root {
            --primary: #1a5276;
            --secondary: #117a65;
            --accent: #e74c3c;
            --info: #3498db;
            --line: #bdc3c7;
            --ink: #1c2833;
            --bg-light: #f8f9fa;
            --esi-1: #27ae60;
            --esi-2: #2ecc71;
            --esi-3: #f1c40f;
            --esi-4: #e67e22;
            --esi-5: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @page {
            size: 11in 8.5in landscape;
            margin: 0.2in;
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            font-size: 7pt;
            line-height: 1.15;
            color: var(--ink);
            background: white;
            padding: 0;
            margin: 0;
        }

        .sheet {
            width: 10.6in;
            height: 8.1in;
            margin: 0 auto;
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-sizing: border-box;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: linear-gradient(135deg, var(--primary), #2980b9);
            border-radius: 6px;
            color: white;
        }

        .title-block h1 {
            font-size: 14pt;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .title-block p {
            font-size: 7pt;
            margin: 2px 0 0;
            opacity: 0.9;
        }

        .shift-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .shift-chip {
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 7pt;
        }

        .shift-chip label {
            display: block;
            font-size: 6pt;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 1px;
        }

        .shift-chip .value {
            font-weight: 600;
        }

        .patient-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            flex: 1;
        }

        .patient-card {
            border: 1.5px solid var(--line);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
            page-break-inside: avoid;
        }

        .patient-card:nth-child(1) { border-top: 4px solid var(--info); }
        .patient-card:nth-child(2) { border-top: 4px solid var(--accent); }
        .patient-card:nth-child(3) { border-top: 4px solid var(--secondary); }
        .patient-card:nth-child(4) { border-top: 4px solid #8e44ad; }
        .patient-card:nth-child(5) { border-top: 4px solid var(--esi-3); }
        .patient-card:nth-child(6) { border-top: 4px solid #d35400; }
        .patient-card:nth-child(7) { border-top: 4px solid #16a085; }
        .patient-card:nth-child(8) { border-top: 4px solid #34495e; }

        .patient-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--line);
        }

        .patient-num {
            font-weight: 700;
            font-size: 9pt;
            color: var(--primary);
        }

        .patient-header .esi {
            display: flex;
            gap: 3px;
        }

        .patient-header .esi span {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            text-align: center;
            line-height: 12px;
            font-size: 7pt;
            border: 1px solid var(--line);
        }

        .patient-header .esi span:nth-child(1) { background-color: var(--esi-1); color: white; }
        .patient-header .esi span:nth-child(2) { background-color: var(--esi-2); color: white; }
        .patient-header .esi span:nth-child(3) { background-color: var(--esi-3); color: black; }
        .patient-header .esi span:nth-child(4) { background-color: var(--esi-4); color: black; }
        .patient-header .esi span:nth-child(5) { background-color: var(--esi-5); color: white; }

        .card-content {
            padding: 5px 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .section {
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 4px 5px;
            min-height: 0;
        }

        .section-title {
            font-size: 6.5pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .demographics-grid {
            display: grid;
            grid-template-columns: 1.5fr 0.5fr;
            gap: 4px;
        }

        .demo-field {
            display: flex;
            flex-direction: column;
        }

        .demo-field label {
            font-size: 5.5pt;
            text-transform: uppercase;
            color: #5d6d7e;
            margin-bottom: 1px;
        }

        .demo-field input {
            border: 1px solid var(--line);
            border-radius: 3px;
            padding: 2px 4px;
            font-size: 7pt;
        }

        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }

        .vitals-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .vitals-item label {
            font-size: 5.5pt;
            text-transform: uppercase;
            color: #5d6d7e;
            margin-bottom: 1px;
        }

        .vitals-item input {
            border: 1px solid var(--line);
            border-radius: 3px;
            padding: 2px 4px;
            font-size: 7pt;
            width: 100%;
            text-align: center;
        }

        .tasks-section {
            background: #f4f6f7;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-item input[type="checkbox"] {
            width: 10px;
            height: 10px;
        }

        .task-item label {
            font-size: 6.5pt;
        }

        .meds-section {
            background: #e8f8f5;
        }

        .meds-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
        }

        .meds-item {
            display: flex;
            flex-direction: column;
        }

        .meds-item label {
            font-size: 5.5pt;
            text-transform: uppercase;
            color: #5d6d7e;
            margin-bottom: 1px;
        }

        .meds-item input {
            border: 1px solid var(--line);
            border-radius: 3px;
            padding: 2px 4px;
            font-size: 7pt;
        }

        .notes-section {
            background: #fef9e7;
        }

        .notes-section textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 3px;
            padding: 3px;
            font-size: 6.5pt;
            min-height: 60px;
            resize: none;
            font-family: inherit;
        }

        .nkda-checkbox {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 3px;
            font-size: 6pt;
        }

        footer {
            text-align: center;
            font-size: 6pt;
            color: #5d6d7e;
            padding: 4px;
            border-top: 1px solid var(--line);
        }

        @media print {
            body {
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
                margin: 0;
                padding: 0;
            }
            
            .sheet {
                width: 10.7in;
                height: 8.2in;
                margin: 0;
                padding: 4px 8px;
                page-break-after: avoid;
            }

            input, textarea {
                border-color: #999 !important;
            }

            .section {
                break-inside: avoid;
            }
            
            .patient-card {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
<div class="sheet">
    <header>
        <div class="title-block">
            <h1>ER Nurse Brain Sheet</h1>
            <p>8 Patients • Emergency Department • Full Patient Coverage</p>
        </div>
        <div class="shift-info">
            <div class="shift-chip">
                <label>Date</label>
                <div class="value">__________</div>
            </div>
            <div class="shift-chip">
                <label>Shift</label>
                <div class="value">Day / Night</div>
            </div>
            <div class="shift-chip">
                <label>Nurse</label>
                <div class="value">__________</div>
            </div>
        </div>
    </header>

    <section class="patient-grid">
        <!-- Repeat 8 patient templates -->
        <article class="patient-card">
            <div class="patient-header">
                <span class="patient-num">Patient 1</span>
                <div class="esi">
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5</span>
                </div>
            </div>
            <div class="card-content">
                <div class="section">
                    <div class="section-title">📋 Demographics</div>
                    <div class="demographics-grid">
                        <div class="demo-field">
                            <label>Name</label>
                            <input type="text" placeholder="Last, First">
                        </div>
                        <div class="demo-field">
                            <label>Room</label>
                            <input type="text" placeholder="___">
                        </div>
                    </div>
                    <div class="demo-field" style="margin-top: 3px;">
                        <label>Additional Details</label>
                        <input type="text" placeholder="MRN, Age, Sex, Weight, Attending">
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">🩺 Vitals</div>
                    <div class="vitals-grid">
                        <div class="vitals-item">
                            <label>BP</label>
                            <input type="text" placeholder="___/___">
                        </div>
                        <div class="vitals-item">
                            <label>HR</label>
                            <input type="text" placeholder="___">
                        </div>
                        <div class="vitals-item">
                            <label>RR</label>
                            <input type="text" placeholder="___">
                        </div>
                        <div class="vitals-item">
                            <label>SpO₂</label>
                            <input type="text" placeholder="___%">
                        </div>
                        <div class="vitals-item">
                            <label>Temp</label>
                            <input type="text" placeholder="___°F">
                        </div>
                    </div>
                    <div class="vitals-grid" style="margin-top: 4px;">
                        <div class="vitals-item">
                            <label>Pain</label>
                            <input type="text" placeholder="0-10">
                        </div>
                        <div class="vitals-item">
                            <label>Glucose</label>
                            <input type="text">
                        </div>
                        <div class="vitals-item">
                            <label>GCS</label>
                            <input type="text" placeholder="E/V/M">
                        </div>
                        <div class="vitals-item">
                            <label>Rhythm</label>
                            <input type="text">
                        </div>
                        <div class="vitals-item">
                            <label>IV Access</label>
                            <input type="text">
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">⚠️ Allergies</div>
                    <div class="demo-field">
                        <div class="nkda-checkbox">
                            <input type="checkbox" id="nkda1"> 
                            <label for="nkda1">NKDA (No Known Drug Allergies)</label>
                        </div>
                        <input type="text" style="margin-top: 3px;" placeholder="List specific allergies if applicable">
                    </div>
                </div>

                <div class="section tasks-section">
                    <div class="section-title">✅ Tasks & Labs</div>
                    <div class="tasks-grid">
                        <div class="task-list">
                            <div class="task-item">
                                <input type="checkbox" id="task1-1">
                                <label for="task1-1">Pending Task 1</label>
                            </div>
                            <div class="task-item">
                                <input type="checkbox" id="task1-2">
                                <label for="task1-2">Pending Task 2</label>
                            </div>
                        </div>
                        <div class="task-list">
                            <div class="task-item">
                                <input type="checkbox" id="lab1-1">
                                <label for="lab1-1">Pending Lab 1</label>
                            </div>
                            <div class="task-item">
                                <input type="checkbox" id="lab1-2">
                                <label for="lab1-2">Pending Lab 2</label>
                            </div>
                        </div>
                    </div>
                    <div class="demo-field" style="margin-top: 4px;">
                        <label>Results Awaiting</label>
                        <input type="text">
                    </div>
                </div>

                <div class="section meds-section">
                    <div class="section-title">💊 Medications</div>
                    <div class="meds-grid">
                        <div class="meds-item">
                            <label>Scheduled Meds</label>
                            <input type="text">
                        </div>
                        <div class="meds-item">
                            <label>PRN Meds</label>
                            <input type="text">
                        </div>
                        <div class="meds-item">
                            <label>IV Fluids</label>
                            <input type="text">
                        </div>
                    </div>
                </div>

                <div class="section notes-section">
                    <div class="section-title">📝 Notes</div>
                    <textarea placeholder="Nursing Notes
Provider Notes
Disposition"></textarea>
                </div>
            </div>
        </article>

        <!-- Repeat exact same patient template 7 more times -->
        <!-- (copy-paste the entire <article class="patient-card"> block) -->
        <!-- Only change: increment Patient number in header (Patient 2, Patient 3, etc.) -->
        
        <!-- Patient 2-8 would go here with identical structure -->
    </section>

    <footer>
        Print in Landscape (11" x 8.5") for best results • 2026 ER Brain Sheet
    </footer>
</div>
</body>
</html>
