<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#63b3ed"/>
      <stop offset="100%" style="stop-color:#4299e1"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="180" ry="180"/>
  
  <!-- Center circle -->
  <circle cx="512" cy="512" r="280" fill="url(#center)"/>
  <circle cx="512" cy="512" r="200" fill="#0a0a0f"/>
  
  <!-- Agent bubbles -->
  <circle cx="350" cy="400" r="70" fill="#48bb78"/>
  <circle cx="674" cy="400" r="70" fill="#f6ad55"/>
  <circle cx="512" cy="700" r="70" fill="#f56565"/>
  <circle cx="280" cy="580" r="50" fill="#718096"/>
  <circle cx="744" cy="580" r="50" fill="#9f7aea"/>
  
  <!-- Connection lines -->
  <line x1="350" y1="400" x2="512" y2="512" stroke="#4a5568" stroke-width="8" opacity="0.5"/>
  <line x1="674" y1="400" x2="512" y2="512" stroke="#4a5568" stroke-width="8" opacity="0.5"/>
  <line x1="512" y1="700" x2="512" y2="512" stroke="#4a5568" stroke-width="8" opacity="0.5"/>
</svg>